run:
  output_dir: ../runs/image_caption_arch_cad_kimi_relay
  resume: true

init:
  data_dir: ../../data/image_caption_arch_cad
  prompt_snapshot: true
  default_language: en
  api_max_retries: 6
  api_base_delay: 10.0

models:
  kimi_k2_6_relay:
    api_key_env: RELAY_API_KEY
    base_url_env: RELAY_BASE_URL
    model_env: RELAY_MODEL
    base_url: ${RELAY_BASE_URL:-http://8.130.30.251:8800}
    model: ${RELAY_MODEL:-kimi-k2.6}
    stream: false
    allow_nonstream_fallback: true
    timeout: 300
    temperature: 0.1
    max_tokens: 4096
    enable_thinking: false
    reasoning_effort: high

operators:
  extract_evidence:
    enabled: true
    model_profile: kimi_k2_6_relay
    temperature: 0.1
    max_tokens: 8192
    stream: false
    allow_nonstream_fallback: true
    enable_thinking: false
    reasoning_effort: high
  induce_rrels:
    enabled: true
    model_profile: kimi_k2_6_relay
    temperature: 0.1
    max_tokens: 8192
    stream: false
    allow_nonstream_fallback: true
    enable_thinking: false
    reasoning_effort: high
  compose_path:
    enabled: true
    model_profile: kimi_k2_6_relay
    temperature: 0.1
    max_tokens: 8192
    stream: false
    allow_nonstream_fallback: true
    enable_thinking: false
    reasoning_effort: high
  generate_sft_qa:
    enabled: true
    model_profile: kimi_k2_6_relay
    temperature: 0.3
    max_tokens: 8192
    stream: false
    allow_nonstream_fallback: true
    enable_thinking: false
    reasoning_effort: low
  judge_quality:
    enabled: true
    model_profile: kimi_k2_6_relay
    temperature: 0.1
    max_tokens: 8192
    stream: false
    allow_nonstream_fallback: true
    enable_thinking: false
    reasoning_effort: minimal

judge:
  max_retries: 2
  accept_threshold: 0.7
  dimension_floor: 0.4
  factual_correctness_floor: 0.8

generation:
  local_max_retries: 2

compose:
  local_max_retries: 2
